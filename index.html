<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iloveastro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    #gameRegion {
      position: relative;
      min-height: calc(100svh - var(--play-top, 0px));
    }
    #app {
      min-height: calc(100svh - var(--play-top, 0px));
    }
    #loadingOverlay.loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      min-height: calc(100svh - var(--play-top, 0px));
      display: grid;
      place-items: center;
      background: #fff;
      color: #000;
    }
    #loadingOverlay .loading-card {
      border: 0;
      background: transparent;
      padding: 0;
      text-align: center;
    }
    #loadingOverlay .loading-word {
      min-height: 2.2rem;
      font: 700 2rem/1.2 Arial, sans-serif;
      letter-spacing: 0.08em;
    }
    #loadingOverlay .loading-note {
      margin-top: 0.45rem;
      font: 400 0.85rem/1.2 Arial, sans-serif;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>iloveastro</h1>
    <div class="save-menu">
      <button id="saveMenuButton" type="button" aria-expanded="false" aria-controls="saveMenu">☰</button>
      <div id="saveMenu" class="save-menu-panel" hidden>
        <div class="small">scores</div>
        <button type="button" data-save-slot="1">save 1</button>
        <button type="button" data-save-slot="2">save 2</button>
        <button type="button" data-save-slot="3">save 3</button>
        <hr>
        <div class="small">defaults</div>
        <label class="save-slider-label">default FOV
          <div class="slider-text-row">
            <input id="defaultFovSlider" type="range" min="20" max="190" step="5">
            <input id="defaultFovInput" type="number" min="20" max="190" step="5">
          </div>
        </label>
        <label class="save-slider-label">default magnitude
          <div class="slider-text-row">
            <input id="defaultMagSlider" type="range" min="4" max="6" step="0.1">
            <input id="defaultMagInput" type="number" min="4" max="6" step="0.1">
          </div>
        </label>
        <hr>
        <button id="resetProgress" type="button">clear current save</button>
        <button id="clearAllSaves" type="button">clear all saves</button>
      </div>
    </div>
  </header>
  <nav id="tabs" aria-label="games"><button type="button" class="active">Charts</button>
    <button type="button">SkyGuessr</button>
    <button type="button">SkyRace</button>
    <button type="button">Sky Map</button>
    <button type="button">Constellation Map</button>
    <button type="button">Find Constellation</button>
    <button type="button">Guess Constellation</button>
    <button type="button">Neighbours</button>
    <button type="button">Stars</button>
    <button type="button">DSOs</button>
    <button type="button">88 Timer</button>
    <button type="button">Atlas</button>
    <button type="button">Tables</button></nav>
  <div id="gameRegion">
    <main id="app"></main>
    <section id="loadingOverlay" class="loading-overlay" data-launch="1">
      <div class="loading-card">
        <div class="loading-word" aria-live="polite">i</div>
        <div class="loading-note">loading...</div>
      </div>
    </section>
  </div>
  <script>
    window.__iloveastroLoadingFrames = ['i','il','ilo','ilov','ilove','ilovea','iloveas','iloveast','iloveastr','iloveastro','loveastro','oveastro','veastro','eastro','astro','stro','tro','ro','o'];
    window.__iloveastroLaunchStartedAt = Date.now();
    window.__iloveastroLaunchMinMs = window.__iloveastroLoadingFrames.length * 70;
    window.__iloveastroSetPlayRegionHeight = function () {
      var region = document.getElementById('gameRegion');
      if (!region) return;
      var top = Math.max(0, Math.round(region.getBoundingClientRect().top));
      document.documentElement.style.setProperty('--play-top', top + 'px');
    };
    window.__iloveastroSetPlayRegionHeight();
    window.addEventListener('resize', window.__iloveastroSetPlayRegionHeight, { passive: true });
    window.__iloveastroLaunchLoader = (function () {
      var i = 0;
      return setInterval(function () {
        var el = document.querySelector('#loadingOverlay .loading-word');
        if (!el) return;
        i = (i + 1) % window.__iloveastroLoadingFrames.length;
        el.textContent = window.__iloveastroLoadingFrames[i];
      }, 70);
    })();
  </script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
