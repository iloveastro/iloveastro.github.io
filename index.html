<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iloveastro</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/logo/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/logo/favicon-16.png">
  <link rel="apple-touch-icon" href="assets/logo/apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="brand"><img src="assets/logo/sky-logo.png" alt="iloveastro logo" class="brand-logo"><span>iloveastro</span></h1>
    <div class="save-menu">
      <button id="saveMenuButton" type="button" aria-expanded="false" aria-controls="saveMenu">☰</button>
      <div id="saveMenu" class="save-menu-panel" hidden>
        <div class="small">scores</div>
        <button type="button" data-save-slot="1">save 1</button>
        <button type="button" data-save-slot="2">save 2</button>
        <button type="button" data-save-slot="3">save 3</button>
        <hr>
        <button id="resetProgress" type="button">clear current save</button>
        <button id="clearAllSaves" type="button">clear all saves</button>
      </div>
    </div>
  </header>
  <nav id="tabs" aria-label="games"></nav>
  <main id="app"></main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
